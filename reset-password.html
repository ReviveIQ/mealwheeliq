<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — MealWheelIQ</title>
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
<style>
:root{
  --coral:#C94B2A;--coral-dark:#A83D22;--coral-pale:#FAF0EB;
  --green:#2A6B4A;
  --ink:#1C1714;--ink2:#4A3F38;--ink3:#8C7B72;
  --cream:#FAF7F2;--card:#FFFFFF;--border:#E2D9CE;--border2:#D4CFC9;
  --red:#C0392B;--red-pale:#FDEDEC;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{background:var(--card);border-radius:16px;padding:2.5rem 2rem;max-width:420px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.06)}
h1{font-family:'Cormorant Garamond',serif;font-size:1.8rem;margin-bottom:.5rem}
p.sub{color:var(--ink3);font-size:14px;margin-bottom:1.5rem}
.form-group{margin-bottom:1rem}
label{display:block;font-size:13px;font-weight:600;margin-bottom:.4rem}
input{width:100%;padding:.7rem;border:1px solid var(--border2);border-radius:8px;font-size:14px;font-family:inherit}
.btn-submit{width:100%;padding:.8rem;background:var(--coral);color:white;border:none;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;margin-top:.5rem}
.btn-submit:hover{background:var(--coral-dark)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed}
.msg{font-size:14px;padding:.8rem;border-radius:8px;margin-bottom:1rem}
.msg.success{background:#EAF3EE;color:var(--green)}
.msg.error{background:var(--red-pale);color:var(--red)}
.terms{text-align:center;margin-top:1.2rem;font-size:13px}
a{color:var(--coral)}
</style>
</head>
<body>

<div class="card">
  <h1>Reset your password</h1>
  <p class="sub" id="sub-text">Enter a new password for your MealWheelIQ account.</p>

  <div id="msg-area"></div>

  <form id="reset-form" onsubmit="handleReset(event)">
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="new-password" placeholder="At least 6 characters" required minlength="6">
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" id="confirm-password" placeholder="Repeat your new password" required minlength="6">
    </div>
    <button type="submit" class="btn-submit" id="reset-btn">Set New Password</button>
  </form>

  <div class="terms"><a href="/login.html">Back to sign in</a></div>
</div>

<script>
const API = 'https://api.mealwheeliq.com';
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

if (!token) {
  document.getElementById('reset-form').style.display = 'none';
  showMsg('This reset link is missing a token. Please request a new one from the login page.', 'error');
}

function showMsg(text, type) {
  document.getElementById('msg-area').innerHTML = `<div class="msg ${type}">${text}</div>`;
}

async function handleReset(e) {
  e.preventDefault();
  const newPassword = document.getElementById('new-password').value;
  const confirmPassword = document.getElementById('confirm-password').value;

  if (newPassword !== confirmPassword) {
    showMsg("Passwords don't match — try again.", 'error');
    return;
  }

  const btn = document.getElementById('reset-btn');
  btn.textContent = 'Updating...';
  btn.disabled = true;

  try {
    const resp = await fetch(API + '/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, newPassword })
    });
    const data = await resp.json();

    if (resp.ok && data.success) {
      document.getElementById('reset-form').style.display = 'none';
      showMsg('✅ Password updated! Redirecting you to sign in...', 'success');
      setTimeout(() => window.location.href = '/login.html', 2000);
    } else {
      showMsg(data.error || 'Something went wrong. Please try again.', 'error');
      btn.textContent = 'Set New Password';
      btn.disabled = false;
    }
  } catch (err) {
    showMsg('Could not reach the server. Please try again.', 'error');
    btn.textContent = 'Set New Password';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
