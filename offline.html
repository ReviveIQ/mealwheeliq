<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MealWheelIQ — Offline</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #FAF8F5; color: #1C1714; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; padding: 2rem; }
    .wrap { max-width: 360px; }
    .emoji { font-size: 64px; margin-bottom: 1.5rem; }
    h1 { font-size: 1.8rem; margin-bottom: .75rem; }
    p { color: #4A3F38; margin-bottom: 2rem; line-height: 1.6; }
    button { background: #C94B2A; color: white; border: none; border-radius: 24px; padding: .85rem 2rem; font-size: 15px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="emoji">🍽️</div>
    <h1>You're offline</h1>
    <p>Looks like you've lost your connection. Chef needs WiFi to cook up new recipes — check your connection and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
